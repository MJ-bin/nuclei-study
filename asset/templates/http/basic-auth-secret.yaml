id: lab-basic-auth-secret

info:
  name: Lab Basic Auth Protected API
  author: local
  severity: info
  description: Requires Basic authentication from -H or a nuclei secret file.
  tags: lab,auth,basicauth

http:
  - method: GET
    path:
      - "{{BaseURL}}/basic-only"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "basic-auth"
          - "basic-only area visible"
        condition: and
