id: lab-header-auth-secret

info:
  name: Lab Header Auth Protected API
  author: local
  severity: info
  description: Requires X-Lab-Auth from -H or a nuclei secret file.
  tags: lab,auth,header

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/private"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "custom-header-auth"
          - "private config visible"
        condition: and
